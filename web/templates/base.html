<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <meta name="description" content="{{.Description}}">
  {{if .Canonical}}<link rel="canonical" href="{{.Canonical}}">{{end}}
  {{if .Robots}}<meta name="robots" content="{{.Robots}}">{{end}}

  <meta property="og:site_name" content="fastmd.dev">
  <meta property="og:title" content="{{if .OGTitle}}{{.OGTitle}}{{else}}{{.Title}}{{end}}">
  <meta property="og:description" content="{{if .OGDescription}}{{.OGDescription}}{{else}}{{.Description}}{{end}}">
  <meta property="og:type" content="{{if .OGType}}{{.OGType}}{{else}}website{{end}}">
  {{if .OGURL}}<meta property="og:url" content="{{.OGURL}}">{{end}}
  {{if .OGImage}}<meta property="og:image" content="{{.OGImage}}">{{end}}

  <meta name="twitter:card" content="{{if .TwitterCard}}{{.TwitterCard}}{{else}}summary_large_image{{end}}">
  <meta name="twitter:title" content="{{if .TwitterTitle}}{{.TwitterTitle}}{{else}}{{.Title}}{{end}}">
  <meta name="twitter:description" content="{{if .TwitterDescription}}{{.TwitterDescription}}{{else}}{{.Description}}{{end}}">
  {{if .TwitterImage}}<meta name="twitter:image" content="{{.TwitterImage}}">{{end}}
  {{if .JSONLD}}
  <script type="application/ld+json">{{.JSONLD}}</script>
  {{end}}
  <link rel="stylesheet" href="/static/style.css?v={{urlquery .AssetVersion}}">
</head>

<body>
  <header class="site-header">
    <nav class="container nav">
      <a href="/" class="brand">fastmd.dev</a>
      <div class="nav-links">
        <a href="/#scenes">Use Cases</a>
        <a href="/#install">Install &amp; API</a>
        <a href="/#why">Why fastmd.dev</a>
        <a href="/#faq">FAQ</a>
      </div>
      <a href="https://github.com/wonfull888/fastmd" target="_blank" rel="noreferrer" class="nav-cta">GitHub</a>
    </nav>
  </header>

  <main>
    {{template "content" .}}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 fastmd.dev · MIT</p>
      <div class="footer-links">
        <a href="https://github.com/wonfull888/fastmd" target="_blank" rel="noreferrer">GitHub</a>
        <a href="/#faq">FAQ</a>
        <a href="/v1/version">API Version</a>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast"></div>
  <script src="/static/app.js?v={{urlquery .AssetVersion}}"></script>
</body>

</html>
